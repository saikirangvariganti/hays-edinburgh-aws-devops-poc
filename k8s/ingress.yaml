apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hays-devops-ingress
  namespace: production
  labels:
    app: hays-devops-app
  annotations:
    kubernetes.io/ingress.class: "alb"
    alb.ingress.kubernetes.io/scheme: "internal"
    alb.ingress.kubernetes.io/target-type: "ip"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-policy: "ELBSecurityPolicy-TLS13-1-2-2021-06"
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:eu-west-2:ACCOUNT_ID:certificate/CERT_ID"
    alb.ingress.kubernetes.io/healthcheck-path: "/health"
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "30"
    alb.ingress.kubernetes.io/success-codes: "200"
    alb.ingress.kubernetes.io/wafv2-acl-arn: "arn:aws:wafv2:eu-west-2:ACCOUNT_ID:regional/webacl/hays-waf/WAF_ID"
spec:
  rules:
    - host: app.hays-devops.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hays-devops-app
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: hays-devops-app
                port:
                  number: 80
  tls:
    - hosts:
        - app.hays-devops.internal
      secretName: hays-tls-secret
